<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ayuda comunitaria ante emergencia sísmica</title>
  <desc id="desc">Escena ilustrada de voluntarios y comunidad respondiendo a una emergencia sísmica.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
