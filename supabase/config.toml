# Emergency Center — Supabase local config
project_id = "emergency-center"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = [
  "http://localhost:4321/api/auth/callback",
  "http://localhost:4321/centros-ayuda/restablecer-contrasena",
  "http://localhost:4321/admin/restablecer",
  "http://localhost:4321/centros-ayuda/acceso",
]

[auth.email]
enable_signup = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Tu código de verificación — Emergency Center"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Restablecer contraseña — Emergency Center"
content_path = "./supabase/templates/recovery.html"
