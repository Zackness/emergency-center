<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Restablecer contraseña</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #1a1a1a; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h2 style="margin-top: 0;">Emergency Center</h2>
    <p>Hola,</p>
    <p>Recibimos una solicitud para restablecer tu contraseña. Haz clic en el enlace:</p>
    <p style="margin: 24px 0;">
      <a
        href="{{ .ConfirmationURL }}"
        style="display: inline-block; padding: 12px 20px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600;"
      >
        Restablecer contraseña
      </a>
    </p>
    <p style="font-size: 14px; color: #52525b;">
      Si prefieres, también puedes usar este código en la app (si aplica):
      <strong style="letter-spacing: 0.15em;">{{ .Token }}</strong>
    </p>
    <p style="font-size: 13px; color: #71717a;">
      Si no solicitaste esto, ignora este correo.
    </p>
    <hr style="border: none; border-top: 1px solid #e4e4e7; margin: 24px 0;" />
    <p style="font-size: 12px; color: #a1a1aa;">
      Correo enviado a {{ .Email }}
    </p>
  </body>
</html>
